openapi: 3.0.3
info:
  title: Insider Notification System API
  description: Event-driven notification system supporting SMS, Email, and Push channels
  version: 1.0.0

servers:
  - url: http://localhost:8080

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /ready:
    get:
      summary: Readiness check
      responses:
        '200':
          description: Service is ready
        '503':
          description: Service is not ready

  /metrics:
    get:
      summary: Real-time metrics
      responses:
        '200':
          description: Current metrics snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsSnapshot'

  /ws/notifications:
    get:
      summary: WebSocket connection for real-time notification status updates
      description: Upgrade to WebSocket to receive notification events

  /api/v1/notifications:
    post:
      summary: Create a notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNotificationRequest'
      responses:
        '201':
          description: Notification created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '400':
          description: Invalid request
        '409':
          description: Duplicate idempotency key

    get:
      summary: List notifications with filters
      parameters:
        - name: channel
          in: query
          schema:
            $ref: '#/components/schemas/Channel'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/Status'
        - name: priority
          in: query
          schema:
            $ref: '#/components/schemas/Priority'
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Notification list
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

  /api/v1/notifications/batch:
    post:
      summary: Create batch of notifications (max 1000)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notifications:
                  type: array
                  items:
                    $ref: '#/components/schemas/CreateNotificationRequest'
                  maxItems: 1000
      responses:
        '201':
          description: Batch created
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch_id:
                    type: string
                    format: uuid
                  count:
                    type: integer

  /api/v1/notifications/{id}:
    get:
      summary: Get notification by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Notification details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '404':
          description: Not found

  /api/v1/notifications/{id}/cancel:
    post:
      summary: Cancel a pending notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Notification cancelled
        '404':
          description: Not found
        '409':
          description: Cannot cancel (already sent/processing)

  /api/v1/notifications/batch/{batch_id}:
    get:
      summary: Get batch status
      parameters:
        - name: batch_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Batch details
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch_id:
                    type: string
                    format: uuid
                  total:
                    type: integer
                  status_counts:
                    type: object
                  notifications:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'

  /api/v1/templates:
    post:
      summary: Create a template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
    get:
      summary: List templates
      responses:
        '200':
          description: Template list

  /api/v1/templates/{id}:
    get:
      summary: Get template by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Template details
    put:
      summary: Update template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '200':
          description: Template updated
    delete:
      summary: Delete template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Template deleted

components:
  schemas:
    Channel:
      type: string
      enum: [sms, email, push]

    Priority:
      type: string
      enum: [high, normal, low]

    Status:
      type: string
      enum: [pending, scheduled, queued, processing, sent, failed, cancelled]

    CreateNotificationRequest:
      type: object
      required: [recipient, channel]
      properties:
        recipient:
          type: string
        channel:
          $ref: '#/components/schemas/Channel'
        content:
          type: string
        priority:
          $ref: '#/components/schemas/Priority'
        template_id:
          type: string
          format: uuid
        template_vars:
          type: object
        scheduled_at:
          type: string
          format: date-time
        idempotency_key:
          type: string

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        batch_id:
          type: string
          format: uuid
        idempotency_key:
          type: string
        recipient:
          type: string
        channel:
          $ref: '#/components/schemas/Channel'
        content:
          type: string
        priority:
          $ref: '#/components/schemas/Priority'
        status:
          $ref: '#/components/schemas/Status'
        template_id:
          type: string
          format: uuid
        template_vars:
          type: object
        scheduled_at:
          type: string
          format: date-time
        provider_msg_id:
          type: string
        attempts:
          type: integer
        max_attempts:
          type: integer
        last_error:
          type: string
        sent_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateTemplateRequest:
      type: object
      required: [name, channel, content]
      properties:
        name:
          type: string
        channel:
          $ref: '#/components/schemas/Channel'
        content:
          type: string
        variables:
          type: array
          items:
            type: string

    Template:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        channel:
          $ref: '#/components/schemas/Channel'
        content:
          type: string
        variables:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MetricsSnapshot:
      type: object
      properties:
        channels:
          type: object
          additionalProperties:
            type: object
            properties:
              sent:
                type: integer
              failed:
                type: integer
              processing:
                type: integer
        websocket_connections:
          type: integer
